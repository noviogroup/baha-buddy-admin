# ─────────────────────────────────────────────────────────────
# CI — Baha Buddy Admin Panel
# Lints, tests, and builds on every push & PR to main/develop
# ─────────────────────────────────────────────────────────────
name: Admin CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: admin-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    name: Lint, Test, Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-admin
          path: coverage/
          retention-days: 7

      - name: Build (Next.js)
        # Required env vars are dummies — we only need the build to
        # type-check and bundle, not connect to real Supabase.
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          SUPABASE_SERVICE_ROLE_KEY: placeholder-service-key
          NEXT_PUBLIC_ADMIN_EMAILS: ci@example.com
        run: npm run build
